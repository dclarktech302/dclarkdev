<svg width="180" height="40" viewBox="0 0 180 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="navGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6200;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Terminal window -->
  <rect x="2" y="8" width="36" height="24" rx="3" fill="#0d0d1a" stroke="url(#navGrad)" stroke-width="1.5"/>

  <!-- Terminal header -->
  <rect x="2" y="8" width="36" height="5" rx="3" fill="url(#navGrad)" opacity="0.8"/>
  <rect x="2" y="10.5" width="36" height="2.5" fill="url(#navGrad)" opacity="0.8"/>

  <!-- Control buttons -->
  <circle cx="6" cy="10.5" r="1.2" fill="#ff5f56"/>
  <circle cx="10" cy="10.5" r="1.2" fill="#ffbd2e"/>
  <circle cx="14" cy="10.5" r="1.2" fill="#27c93f"/>

  <!-- Prompt > -->
  <path d="M 8 18 L 12 20 L 8 22" stroke="#ff6200" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- dclarkdev text -->
  <text x="48" y="25" font-family="'Space Grotesk', sans-serif" font-size="16" font-weight="700" fill="#e8e8f0" letter-spacing="-0.5">dclarkdev</text>

  <!-- Brackets around text -->
  <text x="42" y="25" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="400" fill="#ff6200">&lt;</text>
  <text x="138" y="25" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="400" fill="#8b5cf6">/&gt;</text>
</svg>
