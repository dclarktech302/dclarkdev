<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="termGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6200;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Terminal window -->
  <rect x="30" y="50" width="140" height="100" rx="8" fill="#0d0d1a" stroke="url(#termGrad)" stroke-width="2"/>

  <!-- Terminal header bar -->
  <rect x="30" y="50" width="140" height="20" rx="8" fill="url(#termGrad)" opacity="0.8"/>
  <rect x="30" y="58" width="140" height="12" fill="url(#termGrad)" opacity="0.8"/>

  <!-- Terminal control buttons -->
  <circle cx="42" cy="60" r="3" fill="#ff5f56"/>
  <circle cx="52" cy="60" r="3" fill="#ffbd2e"/>
  <circle cx="62" cy="60" r="3" fill="#27c93f"/>

  <!-- Terminal prompt symbol > -->
  <path d="M 45 85 L 55 95 L 45 105"
        stroke="#ff6200"
        stroke-width="3"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>

  <!-- Command text "dclarkdev" in monospace style -->
  <text x="65" y="100"
        font-family="'JetBrains Mono', monospace"
        font-size="16"
        font-weight="600"
        fill="#e8e8f0">dclarkdev</text>

  <!-- Blinking cursor -->
  <rect x="145" y="88" width="8" height="16" fill="#8b5cf6" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1.5s" repeatCount="indefinite"/>
  </rect>

  <!-- Terminal bottom edge accent -->
  <line x1="45" y1="125" x2="155" y2="125" stroke="url(#termGrad)" stroke-width="1" opacity="0.3"/>
  <text x="100" y="140"
        font-family="'JetBrains Mono', monospace"
        font-size="10"
        font-weight="500"
        fill="#7a7a9a"
        text-anchor="middle">$ make something great</text>
</svg>
