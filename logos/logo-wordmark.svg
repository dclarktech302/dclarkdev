<svg width="300" height="100" viewBox="0 0 300 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wordGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6200;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6200;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Slash prefix -->
  <path d="M 15 20 L 5 60"
        stroke="url(#wordGrad)"
        stroke-width="4"
        stroke-linecap="round"/>

  <!-- DCLARKDEV text -->
  <text x="30" y="55"
        font-family="'Space Grotesk', 'Arial', sans-serif"
        font-size="40"
        font-weight="700"
        fill="#e8e8f0"
        letter-spacing="-1">dclarkdev</text>

  <!-- Gradient underline accent -->
  <rect x="30" y="65" width="220" height="3" fill="url(#wordGrad)" rx="1.5"/>

  <!-- Code bracket wrapper -->
  <text x="20" y="55"
        font-family="'JetBrains Mono', monospace"
        font-size="40"
        font-weight="400"
        fill="#ff6200">&lt;</text>

  <text x="250" y="55"
        font-family="'JetBrains Mono', monospace"
        font-size="40"
        font-weight="400"
        fill="#8b5cf6">/&gt;</text>

  <!-- Tagline -->
  <text x="30" y="82"
        font-family="'Space Grotesk', sans-serif"
        font-size="11"
        font-weight="400"
        fill="#7a7a9a"
        letter-spacing="1">TECHNICAL PIONEER</text>

  <!-- Decorative dots -->
  <circle cx="185" cy="78" r="1.5" fill="#ff6200" opacity="0.6"/>
  <circle cx="195" cy="78" r="1.5" fill="#8b5cf6" opacity="0.6"/>
</svg>
