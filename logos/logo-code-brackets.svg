<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6200;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6200;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.2" />
    </linearGradient>
  </defs>

  <!-- Outer glow circle -->
  <circle cx="100" cy="100" r="95" fill="url(#grad2)" opacity="0.3"/>

  <!-- Main background -->
  <circle cx="100" cy="100" r="85" fill="#0d0d1a"/>

  <!-- Left bracket < -->
  <path d="M 85 60 L 55 100 L 85 140"
        stroke="url(#grad1)"
        stroke-width="8"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>

  <!-- Right bracket > -->
  <path d="M 115 60 L 145 100 L 115 140"
        stroke="url(#grad1)"
        stroke-width="8"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>

  <!-- Forward slash -->
  <text x="82" y="110"
        font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="32"
        font-weight="700"
        fill="#ff6200"
        text-anchor="middle">/</text>

  <!-- DC letters in the center -->
  <text x="106" y="110"
        font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="32"
        font-weight="700"
        fill="#e8e8f0"
        text-anchor="middle">DC</text>

  <!-- Subtle underline accent -->
  <line x1="75" y1="120" x2="125" y2="120"
        stroke="#ff6200"
        stroke-width="2"
        opacity="0.6"/>
</svg>
